# 三条影响最大的红线（对开源数据平台）
# ① IUCN Red List：禁止再分发，须标注版本号，旧版失效 —— 只能申请授权+链接回源+引用等级，不批量镜像
# ② Species+/CITES Checklist：禁止再分发 —— 同上
# ③ BirdLife DataZone：明确禁止爬取与 TDM（含 AI 训练）—— 只能走数据申请流程
# eFloras：条款失联，合规证据最弱，按"保留所有权利"保守处理，建议书面确认
